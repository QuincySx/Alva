[package]
name = "srow-app"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "srow-agent"
path = "src/main.rs"

[lib]
name = "srow_app"
path = "src/lib.rs"

[dependencies]
# UI framework (community edition — self-contained, includes platform backends)
gpui = { package = "gpui-ce", version = "0.3" }

# Core crate (unified engine + skills + MCP)
srow-core = { path = "../srow-core" }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# ID / time
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
