[package]
name = "srow-engine"
version = "0.1.0"
edition = "2021"
description = "Srow Agent core engine — LLM loop, tools, session management"

[lib]
name = "srow_engine"
path = "src/lib.rs"

[[bin]]
name = "srow-cli"
path = "src/bin/cli.rs"

[dependencies]
# LLM framework
rig-core = { version = "0.33", features = ["all"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# ID / time
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"

# Tool implementation helpers
walkdir = "2"
regex = "1"
glob = "0.3"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
