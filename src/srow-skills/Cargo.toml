[package]
name = "srow-skills"
version = "0.1.0"
edition = "2021"
description = "Srow Agent skill system and MCP integration"

[lib]
name = "srow_skills"
path = "src/lib.rs"

[dependencies]
# Internal dependency
srow-engine = { path = "../srow-engine" }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"

# File system
walkdir = "2"

# ID / time
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"

# Logging
tracing = "0.1"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
