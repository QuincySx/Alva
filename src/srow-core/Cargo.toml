[package]
name = "srow-core"
version = "0.1.0"
edition = "2021"
description = "Srow Agent core — agent engine, skill system, MCP integration"

[lib]
name = "srow_core"
path = "src/lib.rs"

[[bin]]
name = "srow-cli"
path = "src/bin/cli.rs"

[dependencies]
# LLM framework
rig-core = { version = "0.33", features = ["all"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"

# ID / time
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"

# Tool implementation helpers
walkdir = "2"
regex = "1"
glob = "0.3"

# Browser automation (Chrome CDP)
chromiumoxide = { version = "0.9", default-features = false }
base64 = "0.22"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Cross-platform app data directory
dirs = "5"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
