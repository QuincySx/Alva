# CI — the guardrails that used to be manual-only.
#
# Design notes:
# - alva-app-tauri is excluded everywhere: it needs system webkit/gtk packages
#   and belongs in its own (future) job with an OS matrix.
# - alva-app-debug is excluded from tests: its integration tests still use
#   fixed sleeps + hardcoded ports 19230-19255 and would be the first flaky
#   source on shared runners. Re-include once they move to port 0 + readiness
#   polling (src already supports `.port(0)`).
# - clippy is report-only (continue-on-error) until the pre-existing warning
#   backlog is cleared; then flip to `-D warnings`. fmt DOES gate — the tree
#   was formatted clean when this pipeline landed.
# - Real-model eval tests are `#[ignore]` + env-gated and never run here;
#   the mock capability suite runs as part of the workspace tests.
# - Coverage is visibility-only (no threshold yet — ratchet later).

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt (gating)
        run: cargo fmt --all -- --check
      - name: clippy (report-only until the warning backlog is cleared)
        run: cargo clippy --workspace --exclude alva-app-tauri --all-targets
        continue-on-error: true

  test:
    name: workspace tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (workspace minus tauri/app-debug)
        run: cargo test --workspace --exclude alva-app-tauri --exclude alva-app-debug

  deps-firewall:
    name: dependency firewall + wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: ci-check-deps (layering rules + bus lint + wasm32 set)
        run: ./scripts/ci-check-deps.sh

  coverage:
    name: coverage baseline (no threshold)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: llvm-cov summary + lcov artifact
        run: |
          cargo llvm-cov --workspace --exclude alva-app-tauri --exclude alva-app-debug \
            --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only
      - uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
