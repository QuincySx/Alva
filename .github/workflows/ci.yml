# CI pipeline for the Alva workspace.
#
# Shape — three stages, fail fast, no wasted runners:
#
#   format ─┬─→ test ──→ coverage
#           ├─→ clippy
#           └─→ deps
#
#   1. format   — rustfmt, seconds-level. A formatting slip fails the whole
#                 pipeline here instead of burning runners on the heavy jobs.
#   2. test / clippy / deps — run in parallel, only once formatting is clean.
#   3. coverage — after tests pass; visibility only, never gates.
#
# Scope notes:
# - alva-app-tauri is excluded from the Rust jobs: it needs system webkit/gtk
#   and belongs in its own OS-matrix job (future work).
# - clippy is report-only (continue-on-error) until the pre-existing warning
#   backlog is cleared; then flip to `-D warnings` and drop continue-on-error.
# - Real-model eval tests are `#[ignore]` + env-gated and never run here; the
#   mock capability suite runs as part of `test`.
# - Coverage has no threshold yet (ratchet later); it uploads an lcov artifact.

name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

# A newer push on the same ref makes in-flight runs obsolete — cancel them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the pipeline only reads the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Stage 1 — fast gate ───────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ── Stage 2 — parallel checks (gated on a clean format) ───────────────
  test:
    name: Test
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      # rquickjs-sys curls a 113MB wasi-sdk in its build script on every cold
      # build, and cargo --offline does not stop it. Cache it once (keyed on the
      # version rquickjs-sys 0.12.1 pins) and point WASI_SDK at it, so the build
      # script and the guest-building tests reuse the install instead of
      # re-downloading. Bump the key when rquickjs's WASI_SDK_VERSION changes.
      - name: cache the WASI SDK
        uses: actions/cache@v4
        with:
          path: ~/.cache/wasi-sdk
          key: wasi-sdk-24.0-x86_64-linux
      - name: install the WASI SDK on a cache miss and export WASI_SDK
        run: |
          root="$HOME/.cache/wasi-sdk/wasi-sdk-24.0-x86_64-linux"
          if [ ! -x "$root/bin/clang" ]; then
            mkdir -p "$HOME/.cache/wasi-sdk"
            curl -fsSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz \
              | tar -xz -C "$HOME/.cache/wasi-sdk"
          fi
          echo "WASI_SDK=$root" >> "$GITHUB_ENV"
      # The CLI's wasm-tier tests locate the guest the way a user's install
      # does — via the sidecar search path — rather than building it. A dev
      # machine always has the artifact lying around from earlier work, so the
      # gap only shows up on a cold checkout. Build it first.
      - name: build the wasm worker guest (sidecar the CLI tests discover)
        run: cargo build -p alva-worker-wasm --target wasm32-wasip1
      - name: cargo test (workspace, minus tauri)
        run: cargo test --workspace --exclude alva-app-tauri

  clippy:
    name: Lint
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy (report-only)
        run: cargo clippy --workspace --exclude alva-app-tauri --all-targets
        continue-on-error: true

  deps:
    name: Dependency firewall + wasm32
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: ci-check-deps (layering rules + bus lint + wasm32 sets)
        run: ./scripts/ci-check-deps.sh

  # ── Stage 3 — coverage (visibility only, after tests pass) ────────────
  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: wasm32-wasip1
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # Same shared wasi-sdk cache as the Test job — see the note there.
      - name: cache the WASI SDK
        uses: actions/cache@v4
        with:
          path: ~/.cache/wasi-sdk
          key: wasi-sdk-24.0-x86_64-linux
      - name: install the WASI SDK on a cache miss and export WASI_SDK
        run: |
          root="$HOME/.cache/wasi-sdk/wasi-sdk-24.0-x86_64-linux"
          if [ ! -x "$root/bin/clang" ]; then
            mkdir -p "$HOME/.cache/wasi-sdk"
            curl -fsSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz \
              | tar -xz -C "$HOME/.cache/wasi-sdk"
          fi
          echo "WASI_SDK=$root" >> "$GITHUB_ENV"
      # Same sidecar dependency as the Test job: the CLI's wasm-tier tests
      # discover the guest instead of building it. llvm-cov relocates the target
      # dir, but the workspace-relative candidate it falls back to is absolute,
      # so an ordinary build here is enough.
      - name: build the wasm worker guest (sidecar the CLI tests discover)
        run: cargo build -p alva-worker-wasm --target wasm32-wasip1
      - name: cargo llvm-cov (summary + lcov)
        run: |
          cargo llvm-cov --workspace --exclude alva-app-tauri \
            --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only
      - uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info
          # Push CI runs constantly; keeping coverage blobs the default 90
          # days just piles up storage. One day is plenty to peek at a run.
          retention-days: 1
