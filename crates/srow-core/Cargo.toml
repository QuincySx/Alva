[package]
name = "srow-core"
version = "0.1.0"
edition = "2021"
description = "Srow Agent core — thin facade over extracted crates, plus skills, MCP, environment"

[lib]
name = "srow_core"
path = "src/lib.rs"

[[bin]]
name = "srow-cli"
path = "src/bin/cli.rs"

[dependencies]
# Extracted agent crates
alva-types = { path = "../alva-types" }
alva-core = { path = "../alva-core" }
alva-tools = { path = "../alva-tools" }
alva-security = { path = "../alva-security" }
alva-memory = { path = "../alva-memory" }
alva-runtime = { path = "../alva-runtime" }
alva-protocol-acp = { path = "../alva-protocol-acp" }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"
bytes = "1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"

# ID / time
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }

# Error handling
thiserror = "2"

# Filesystem traversal (used by memory/sync and skills/skill_fs)
walkdir = "2"

# SQLite persistence
rusqlite = { version = "0.31", features = ["bundled"] }
tokio-rusqlite = "0.5"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Cross-platform app data directory
dirs = "5"

# Archive extraction (environment runtime management)
zip = "2"
tar = "0.4"
flate2 = "1"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
tokio-stream = "0.1"
alva-test = { path = "../alva-test" }
