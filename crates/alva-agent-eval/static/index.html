<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alva-eval</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>alva-eval</h1>
    <span class="tag">Agent Playground</span>
  </div>
  <nav class="nav">
    <a href="/" class="nav-link active">Playground</a>
    <a href="/inspector.html" class="nav-link">Inspector</a>
    <a href="/compare.html" class="nav-link">Compare</a>
  </nav>

  <!-- Sidebar: Configuration -->
  <aside class="sidebar">
    <!-- Provider profile selector -->
    <label>Provider Profile</label>
    <div style="display:flex;gap:4px;align-items:center">
      <select id="profile-select" onchange="loadProfile()" style="flex:1"></select>
      <button onclick="saveProfile()" class="btn-sm" title="Save current settings">Save</button>
      <button onclick="addProfile()" class="btn-sm" title="New profile">+</button>
      <button onclick="deleteProfile()" class="btn-sm btn-sm-danger" title="Delete">Del</button>
    </div>

    <label>Provider Type</label>
    <div class="radio-group">
      <label><input type="radio" name="provider" value="anthropic" checked> Anthropic</label>
      <label><input type="radio" name="provider" value="openai"> OpenAI</label>
      <label><input type="radio" name="provider" value="openai-responses"> OpenAI Responses</label>
    </div>

    <label for="model">Model</label>
    <input id="model" type="text" value="claude-sonnet-4-20250514" placeholder="model id">

    <label for="apikey">API Key</label>
    <input id="apikey" type="password" placeholder="sk-ant-...">

    <label for="baseurl">Base URL <span style="font-weight:400;text-transform:none">(optional)</span></label>
    <input id="baseurl" type="text" placeholder="default per provider">

    <label for="system">System Prompt</label>
    <textarea id="system" rows="4">You are a helpful coding assistant. Use tools when appropriate.</textarea>

    <label for="prompt">User Prompt</label>
    <textarea id="prompt" rows="3" placeholder="Ask the agent something..."></textarea>

    <label>Tools</label>
    <div class="tool-actions">
      <button onclick="selectAllTools()">Select All</button>
      <button onclick="selectNoTools()">Select None</button>
      <button onclick="selectCoreTools()">Core Only</button>
    </div>
    <div class="tool-picker" id="tool-picker">
      <div style="color:var(--text-dim);font-size:12px;padding:8px">Loading tools...</div>
    </div>

    <label>Skills</label>
    <div class="tool-actions">
      <button onclick="scanSkills()">Scan Sources</button>
    </div>
    <div class="tool-picker" id="skill-picker">
      <div style="color:var(--text-dim);font-size:12px;padding:8px">Click Scan to discover skills</div>
    </div>

    <label for="workspace">Workspace <span style="font-weight:400;text-transform:none">(tools operate here)</span></label>
    <div style="display:flex;gap:6px">
      <input id="workspace" type="text" placeholder="empty = temp dir" value="" style="flex:1">
      <button onclick="openBrowser()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;white-space:nowrap">Browse</button>
    </div>
    <div id="dir-browser" style="display:none"></div>

    <label for="maxiter">Max Iterations</label>
    <input id="maxiter" type="number" value="10" min="1" max="100">

    <label>Features</label>
    <div style="display:flex;flex-direction:column;gap:4px">
      <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;cursor:pointer;margin:0">
        <input type="checkbox" id="enable-sub-agents" style="width:auto;accent-color:var(--blue)">
        Sub-Agents
      </label>
      <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-weight:400;cursor:pointer;margin:0">
        <input type="checkbox" id="enable-browser" style="width:auto;accent-color:var(--blue)">
        Browser Tools
      </label>
    </div>

    <button class="btn-run" id="btn-run" onclick="startRun()">Run</button>
  </aside>

  <!-- Main: Event Stream -->
  <main class="main" id="events"></main>

  <!-- Footer -->
  <div class="footer">
    <span id="status">Ready</span>
    <div class="stats" id="stats"></div>
  </div>
</div>

<script src="/shared.js"></script>
<script src="/storage.js"></script>
<script src="/app.js"></script>
</body>
</html>
