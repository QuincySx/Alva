<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alva-eval — Compare</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="compare-app">
  <div class="header">
    <h1>alva-eval</h1>
    <span class="tag">Compare</span>
    <button class="btn-run" id="btn-compare" onclick="startCompare()" style="width:auto;margin:0;padding:6px 16px;font-size:12px">Run Both</button>
  </div>
  <nav class="nav">
    <a href="/" class="nav-link">Playground</a>
    <a href="/inspector.html" class="nav-link">Inspector</a>
    <a href="/compare.html" class="nav-link active">Compare</a>
  </nav>

  <div class="compare-body">
    <div class="compare-panel">
      <h3 style="font-size:13px;color:var(--text-dim);margin-bottom:8px">Run A</h3>
      <label>Provider</label>
      <div class="radio-group">
        <label><input type="radio" name="provider-a" value="anthropic" checked> Anthropic</label>
        <label><input type="radio" name="provider-a" value="openai"> OpenAI</label>
        <label><input type="radio" name="provider-a" value="openai-responses"> OpenAI Responses</label>
      </div>
      <label>Model</label>
      <input id="model-a" type="text" value="claude-sonnet-4-20250514">
      <label>API Key</label>
      <input id="apikey-a" type="password" placeholder="sk-ant-...">
      <label>System Prompt</label>
      <textarea id="system-a" rows="3">You are a helpful coding assistant.</textarea>
      <label>User Prompt</label>
      <textarea id="prompt-a" rows="2" placeholder="..."></textarea>
      <label>Max Iterations</label>
      <input id="maxiter-a" type="number" value="10">
      <div class="events-panel" id="events-a"></div>
    </div>

    <div class="compare-panel">
      <h3 style="font-size:13px;color:var(--text-dim);margin-bottom:8px">Run B</h3>
      <label>Provider</label>
      <div class="radio-group">
        <label><input type="radio" name="provider-b" value="anthropic" checked> Anthropic</label>
        <label><input type="radio" name="provider-b" value="openai"> OpenAI</label>
        <label><input type="radio" name="provider-b" value="openai-responses"> OpenAI Responses</label>
      </div>
      <label>Model</label>
      <input id="model-b" type="text" value="claude-sonnet-4-20250514">
      <label>API Key</label>
      <input id="apikey-b" type="password" placeholder="sk-ant-...">
      <label>System Prompt</label>
      <textarea id="system-b" rows="3">You are a helpful coding assistant.</textarea>
      <label>User Prompt</label>
      <textarea id="prompt-b" rows="2" placeholder="..."></textarea>
      <label>Max Iterations</label>
      <input id="maxiter-b" type="number" value="10">
      <div class="events-panel" id="events-b"></div>
    </div>
  </div>

  <div id="diff-summary" class="footer" style="display:none"></div>
  <div class="footer">
    <span id="status">Configure both runs and click Run Both</span>
  </div>
</div>

<script src="/shared.js"></script>
<script src="/compare.js"></script>
</body>
</html>
