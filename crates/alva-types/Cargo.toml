[package]
name = "alva-types"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time"] }
tracing = "0.1"
futures-core = "0.3"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
