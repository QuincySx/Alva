[package]
name = "alva-sandbox-wasm"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "2"
wasmtime = { version = "46.0.1", default-features = false, features = ["cranelift", "runtime"] }
wasmtime-wasi = { version = "46.0.1", default-features = false, features = ["p1"] }

[dev-dependencies]
alva-kernel-abi = { path = "../alva-kernel-abi" }
alva-test = { path = "../alva-test" }
tempfile = "3"
tokio = { version = "1", features = ["rt"] }
