[package]
name = "alva-sandbox-wasm"
version = "0.1.0"
edition = "2021"

[dependencies]
alva-llm-wire = { path = "../alva-llm-wire" }
alva-sandbox-abi = { path = "../alva-sandbox-abi" }
reqwest = { version = "0.12", features = ["blocking"] }
serde_json = "1"
thiserror = "2"
wasmtime = { version = "46.0.1", default-features = false, features = ["cranelift", "runtime"] }
wasmtime-wasi = { version = "46.0.1", default-features = false, features = ["p1"] }

[dev-dependencies]
alva-kernel-abi = { path = "../alva-kernel-abi" }
alva-test = { path = "../alva-test" }
async-trait = "0.1"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
tokio = { version = "1", features = ["rt"] }
