[package]
name = "alva-host-wasm"
version = "0.1.0"
edition = "2021"
description = "wasm32 host assembly for the alva agent kernel — the wasm-side counterpart of alva-host-native"

[dependencies]
alva-kernel-abi = { path = "../alva-kernel-abi" }
alva-kernel-core = { path = "../alva-kernel-core" }
async-trait = "0.1"
futures-core = "0.3"
# tokio is already a transitive dep via alva-kernel-abi; we only need its
# sync feature for the oneshot channel + mpsc, both of which are wasm32-safe.
tokio = { version = "1", default-features = false, features = ["sync"] }

# wasm-only deps. On native targets these are skipped, so the WasmSleeper
# module is also gated on cfg(target_family = "wasm").
[target.'cfg(target_family = "wasm")'.dependencies]
gloo-timers = { version = "0.3", features = ["futures"] }
wasm-bindgen-futures = "0.4"
