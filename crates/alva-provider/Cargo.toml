[package]
name = "alva-provider"
version = "0.1.0"
edition = "2021"
description = "OpenAI-compatible LLM provider for alva agent framework"

[dependencies]
alva-types = { path = "../alva-types" }
async-trait = "0.1"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
futures-core = "0.3"
futures = "0.3"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
chrono = "0.4"
