[package]
name = "alva-protocol-skill"
version = "0.1.0"
edition = "2021"
description = "Standalone Skill system: discovery, loading, injection, and in-memory store"

[features]
default = ["fs"]
fs = ["walkdir"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
walkdir = { version = "2", optional = true }
async-trait = "0.1"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
tokio = { version = "1", features = ["fs"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "fs"] }
tempfile = "3"
