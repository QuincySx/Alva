[package]
name = "alva-worker-wasm"
version = "0.1.0"
edition = "2021"

[target.'cfg(target_os = "wasi")'.dependencies]
alva-agent-core = { path = "../alva-agent-core" }
alva-agent-extension-builtin = { path = "../alva-agent-extension-builtin", default-features = false, features = ["core"] }
alva-kernel-abi = { path = "../alva-kernel-abi" }
alva-kernel-core = { path = "../alva-kernel-core" }
alva-llm-wire = { path = "../alva-llm-wire" }
async-trait = "0.1"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# QuickJS for the run_script tool (ticket 06). default-features=false keeps the
# module loader out: run_script has no import/require by contract.
[target.'cfg(all(target_family = "wasm", target_os = "wasi"))'.dependencies]
rquickjs = { version = "0.12", default-features = false }
