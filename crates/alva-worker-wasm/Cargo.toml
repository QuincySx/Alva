[package]
name = "alva-worker-wasm"
version = "0.1.0"
edition = "2021"

[target.'cfg(target_os = "wasi")'.dependencies]
alva-agent-core = { path = "../alva-agent-core" }
alva-agent-extension-builtin = { path = "../alva-agent-extension-builtin", default-features = false, features = ["core"] }
alva-kernel-abi = { path = "../alva-kernel-abi" }
alva-kernel-core = { path = "../alva-kernel-core" }
async-trait = "0.1"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
