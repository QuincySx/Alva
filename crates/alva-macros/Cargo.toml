[package]
name = "alva-macros"
version = "0.1.0"
edition = "2021"
description = "Proc macros for Alva — code-generation helpers for tools, extensions, and other plugin-layer conventions."

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full", "extra-traits"] }
darling = "0.20"
