[package]
name = "protocol-context-skill"
version = "0.1.0"
edition = "2021"
description = "Standalone Skill system: discovery, loading, injection, and in-memory store"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
walkdir = "2"
async-trait = "0.1"
tokio = { version = "1", features = ["fs", "sync"] }
tracing = "0.1"
