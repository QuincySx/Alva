[package]
name = "alva-kernel-abi"
version = "0.1.0"
edition = "2021"

[dependencies]
alva-kernel-bus = { path = "../alva-kernel-bus" }
alva-macros = { path = "../alva-macros" }
async-trait = "0.1"
schemars = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", default-features = false, features = ["sync", "time"] }
tracing = "0.1"
futures-core = "0.3"
futures-util = { version = "0.3", default-features = false, features = ["std"] }
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "wasmbind"] }

# wasm32 needs the `js` feature on uuid (and on getrandom transitively) for
# random byte generation via the browser RNG. Native is unaffected.
[target.'cfg(target_family = "wasm")'.dependencies]
uuid = { version = "1", features = ["v4", "js"] }
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
