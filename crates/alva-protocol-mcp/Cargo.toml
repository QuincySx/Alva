[package]
name = "alva-protocol-mcp"
version = "0.1.0"
edition = "2021"
description = "MCP (Model Context Protocol) client: connect to MCP servers, enumerate tools, and invoke them"

[dependencies]
alva-kernel-abi = { path = "../alva-kernel-abi" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "time"] }
tracing = "0.1"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
tokio = { version = "1", features = ["process", "io-util", "fs"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile = "3"

[features]
default = ["native"]
native = []
