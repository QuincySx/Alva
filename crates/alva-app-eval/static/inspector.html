<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alva-eval — Inspector</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="inspector-app">
  <div class="header">
    <h1>alva-eval</h1>
    <span class="tag">Inspector</span>
  </div>
  <nav class="nav">
    <a href="/" class="nav-link">Playground</a>
    <a href="/inspector.html" class="nav-link active">Inspector</a>
    <a href="/compare.html" class="nav-link">Compare</a>
  </nav>

  <div class="inspector-body">
    <!-- Left: run list -->
    <aside class="inspector-runs" id="run-list">
      <label>Completed Runs</label>
      <div id="runs-container" style="margin-top:8px">
        <div style="color:var(--text-dim);font-size:12px">Loading...</div>
      </div>
    </aside>

    <!-- Center: event timeline -->
    <div class="inspector-timeline" id="inspector-content">
      <div style="color:var(--text-dim);margin:auto;font-size:13px">Select a run to inspect</div>
    </div>

    <!-- Right: detail panel -->
    <div class="inspector-detail" id="detail-panel">
      <div style="color:var(--text-dim);font-size:12px;padding:16px">Click any event block to see details</div>
    </div>
  </div>

  <div class="footer">
    <span id="status">Ready</span>
    <div class="stats" id="stats"></div>
  </div>
</div>

<script src="/shared.js"></script>
<script src="/inspector.js"></script>
</body>
</html>
