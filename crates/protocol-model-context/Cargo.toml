[package]
name = "protocol-model-context"
version = "0.1.0"
edition = "2021"
description = "MCP (Model Context Protocol) client: connect to MCP servers, enumerate tools, and invoke them"

[dependencies]
agent-types = { path = "../agent-types" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "process", "io-util", "time", "fs"] }
tracing = "0.1"
