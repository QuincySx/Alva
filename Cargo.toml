[workspace]
members = [
    "crates/srow-app",
    "crates/srow-core",
    "crates/srow-debug",
    "crates/agent-base",
    "crates/agent-core",
    "crates/agent-graph",
    "crates/protocol-context-skill",
]
resolver = "2"

[profile.dev]
incremental = true

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
opt-level = 3
strip = true
